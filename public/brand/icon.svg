<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007A5E"/>
      <stop offset="100%" style="stop-color:#004a39"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#EACCD4"/>
  
  <!-- Main leaf/bloom shape -->
  <g transform="translate(256, 280)">
    <!-- Bottom left leaf -->
    <path d="M-80 0 C-80 -100 -20 -140 0 -140 C-60 -100 -60 -40 -60 0 Z" fill="url(#leafGrad)" opacity="0.9"/>
    
    <!-- Bottom right leaf -->
    <path d="M80 0 C80 -100 20 -140 0 -140 C60 -100 60 -40 60 0 Z" fill="url(#leafGrad)" opacity="0.9"/>
    
    <!-- Top leaf (larger, centered) -->
    <path d="M0 -20 C-60 -80 -40 -180 0 -220 C40 -180 60 -80 0 -20 Z" fill="url(#leafGrad)"/>
    
    <!-- Center vein on top leaf -->
    <path d="M0 -40 L0 -200" stroke="#EACCD4" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Stem -->
    <rect x="-8" y="-20" width="16" height="80" rx="8" fill="#004a39"/>
  </g>
  
  <!-- Subtle sparkle accents -->
  <circle cx="340" cy="140" r="8" fill="#007A5E" opacity="0.4"/>
  <circle cx="380" cy="180" r="5" fill="#007A5E" opacity="0.3"/>
  <circle cx="160" cy="120" r="6" fill="#007A5E" opacity="0.35"/>
</svg>
