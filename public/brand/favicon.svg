<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#007A5E"/>
  
  <!-- Simplified bloom/leaf -->
  <g transform="translate(16, 18)">
    <!-- Three leaves pointing up -->
    <path d="M0 -2 C-4 -6 -3 -12 0 -14 C3 -12 4 -6 0 -2 Z" fill="#EACCD4"/>
    <path d="M-5 2 C-7 -2 -5 -8 -2 -10 C-1 -6 -3 -1 -5 2 Z" fill="#EACCD4" opacity="0.8"/>
    <path d="M5 2 C7 -2 5 -8 2 -10 C1 -6 3 -1 5 2 Z" fill="#EACCD4" opacity="0.8"/>
    
    <!-- Stem -->
    <rect x="-1.5" y="-2" width="3" height="10" rx="1.5" fill="#004a39"/>
  </g>
</svg>
