<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EACCD4"/>
      <stop offset="100%" style="stop-color:#e0bfc8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)"/>
  
  <!-- Border ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#007A5E" stroke-width="4"/>
  
  <!-- Seedling icon -->
  <g transform="translate(200, 200)" filter="url(#shadow)">
    <!-- Stem -->
    <path d="M0 80 Q0 20 0 -20" stroke="#007A5E" stroke-width="16" fill="none" stroke-linecap="round"/>
    
    <!-- Left leaf -->
    <ellipse cx="-35" cy="-10" rx="40" ry="25" fill="#007A5E" transform="rotate(-30)"/>
    
    <!-- Right leaf -->
    <ellipse cx="35" cy="-30" rx="45" ry="28" fill="#007A5E" transform="rotate(20)"/>
    
    <!-- Top sprout -->
    <ellipse cx="5" cy="-70" rx="20" ry="35" fill="#4D9E8A" transform="rotate(10)"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="340" text-anchor="middle" font-family="Impact, sans-serif" font-size="36" fill="#007A5E" letter-spacing="2">BLOOMSCROLL</text>
</svg>
